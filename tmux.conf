# ── Status bar appearance ────────────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-style 'bg=green fg=black bold'
set -g status-left-length 200
set -g status-right-length 0
set -g status-right ''
set -g status-interval 2

# ── Status bar content ───────────────────────────────────────────────────────
# @auto_status  — updated every prompt by bash (hostname | cwd | N jobs)
# @custom_status — set by the user via the keybind below; empty = auto mode
set -g @auto_status ' loading… '
set -g @custom_status ''

# Show custom text when set, otherwise show the auto status from bash.
set -g status-left '#{?@custom_status,#{@custom_status},#{@auto_status}}'

# ── Keybindings ──────────────────────────────────────────────────────────────
# Prefix is Ctrl-b (default).  Press Ctrl-b S to set/clear custom status text.
bind-key S command-prompt -p "Status text (empty to reset to auto):" \
    "run-shell '$TERMINATOR_SHELL_DIR/set-status.sh %%'"

# ── Minimal chrome ───────────────────────────────────────────────────────────
set -g pane-border-status off
set -g window-status-format ''
set -g window-status-current-format ''
